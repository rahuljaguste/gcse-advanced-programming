<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard — GCSE Advanced Programming</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <style>
    :root {
      --bg-dark: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-sidebar: #16213e;
      --accent-blue: #00d4ff;
      --accent-green: #00ff88;
      --accent-purple: #a855f7;
      --accent-orange: #ff9f43;
      --accent-red: #ff4757;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-dim: #71717a;
      --border: #27273a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 40px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--accent-blue); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      color: white;
      font-weight: 600;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

    /* Student cards */
    .student-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .student-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .student-name {
      font-size: 1.3rem;
      font-weight: 700;
      text-transform: capitalize;
      color: var(--accent-blue);
    }
    .student-meta { font-size: 0.75rem; color: var(--text-dim); }
    .student-progress-bar {
      width: 100%;
      height: 10px;
      background: var(--bg-dark);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .student-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
      border-radius: 5px;
      transition: width 0.5s;
    }
    .student-percent {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* Chapter grid */
    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .ch-badge {
      text-align: center;
      padding: 10px 6px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text-dim);
    }
    .ch-badge.done {
      background: rgba(0,255,136,0.1);
      border-color: rgba(0,255,136,0.3);
      color: var(--accent-green);
    }
    .ch-badge .ch-label { display: block; font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }
    .ch-badge.done .ch-label { color: rgba(0,255,136,0.5); }

    /* Quiz scores */
    .quiz-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .quiz-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--accent-purple);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .quiz-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text-secondary);
    }
    .score-good { color: var(--accent-green); }
    .score-ok { color: var(--accent-orange); }
    .score-bad { color: var(--accent-red); }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
    }
    .empty-state p { font-size: 1.1rem; margin-top: 12px; }

    .last-updated {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 24px;
    }

    #loading {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
      font-size: 1.1rem;
    }

    .chapter-names {
      display: none; /* hidden data for JS */
    }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .chapter-grid { grid-template-columns: repeat(5, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 Teacher Dashboard</h1>
    <p style="color: var(--text-dim); font-size: 0.85rem;">Student Progress</p>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="loadDashboard()">Refresh</button>
    <a href="/" class="btn btn-primary">Student Site</a>
  </div>
</div>

<div class="stats-grid" id="stats-grid"></div>

<div id="loading">Loading student data...</div>
<div id="students-container"></div>
<div class="last-updated" id="last-updated"></div>

<script>
let CL = {};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard');
    const data = await res.json();
    renderDashboard(data);
  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<p style="color: var(--accent-red);">Could not connect to server. Is it running?</p>';
  }
}

function scoreCls(pct) { return pct >= 80 ? 'score-good' : pct >= 50 ? 'score-ok' : 'score-bad'; }

function renderDashboard(data) {
  const { students, chapters, chapter_labels, quiz_chapters } = data;
  CL = chapter_labels || {};
  document.getElementById('loading').style.display = 'none';

  // Stats
  const totalStudents = students.length;
  const avgProgress = totalStudents > 0 ? Math.round(students.reduce((s, st) => s + st.percent, 0) / totalStudents) : 0;
  const totalAttempts = students.reduce((s, st) => {
    return s + Object.values(st.quiz_history || {}).reduce((a, h) => a + h.length, 0);
  }, 0);
  const fullyComplete = students.filter(st => st.percent === 100).length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalStudents}</div><div class="stat-label">Students</div></div>
    <div class="stat-card"><div class="stat-value">${avgProgress}%</div><div class="stat-label">Avg Progress</div></div>
    <div class="stat-card"><div class="stat-value">${totalAttempts}</div><div class="stat-label">Quiz Attempts</div></div>
    <div class="stat-card"><div class="stat-value">${fullyComplete}</div><div class="stat-label">Completed All</div></div>
  `;

  const container = document.getElementById('students-container');
  if (students.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:3rem;">🎓</div><p>No students yet.</p></div>';
    return;
  }

  container.innerHTML = students.map(st => {
    // Chapter progress with timestamps
    const chapterRows = chapters.map(ch => {
      const done = st.chapters[ch];
      const date = st.chapter_dates[ch] || '';
      return `<tr>
        <td>${escapeHtml(CL[ch] || ch)}</td>
        <td>${done ? '<span class="score-good">✓ Done</span>' : '<span style="color:var(--dim)">—</span>'}</td>
        <td style="font-size:0.75rem;color:var(--dim)">${date || ''}</td>
      </tr>`;
    }).join('');

    // Quiz scores with attempts & history
    const quizRows = (quiz_chapters || []).map(ch => {
      const best = st.quizzes[ch];
      const history = (st.quiz_history || {})[ch] || [];
      const attempts = history.length;

      if (!best && attempts === 0) {
        return `<tr>
          <td>${escapeHtml(CL[ch] || ch)}</td>
          <td style="color:var(--dim)">Not attempted</td>
          <td>0</td>
          <td></td>
        </tr>`;
      }

      const [got, total] = best ? best.split('/').map(Number) : [0, 0];
      const pct = total > 0 ? Math.round((got / total) * 100) : 0;

      // Build attempt history detail
      const historyDetail = history.map((h, i) => {
        const hpct = h.total > 0 ? Math.round((h.score / h.total) * 100) : 0;
        return `<span class="${scoreCls(hpct)}" style="font-size:0.72rem">${h.score}/${h.total}</span>`;
      }).join(' → ');

      return `<tr>
        <td>${escapeHtml(CL[ch] || ch)}</td>
        <td class="${scoreCls(pct)}">${best} (${pct}%)</td>
        <td>${attempts}</td>
        <td style="font-size:0.72rem">${historyDetail || ''}</td>
      </tr>`;
    }).join('');

    // Weakness analysis
    const analysis = st.analysis || {};
    let analysisHtml = '';

    if (analysis.weaknesses && analysis.weaknesses.length > 0) {
      analysisHtml += `<div style="margin-top:12px">
        <h4 style="color:var(--accent-red);font-size:0.8rem;margin-bottom:6px;">⚠ Needs Improvement</h4>
        ${analysis.weaknesses.map(w => `
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.8rem;">
            <span>${escapeHtml(w.label)} <span class="${w.status === 'weak' ? 'score-bad' : 'score-ok'}">(${w.best_pct}%)</span></span>
            <span style="color:var(--dim)">${escapeHtml(w.advice)}</span>
          </div>
        `).join('')}
      </div>`;
    }

    if (analysis.not_attempted && analysis.not_attempted.length > 0) {
      analysisHtml += `<div style="margin-top:8px">
        <h4 style="color:var(--accent-orange);font-size:0.8rem;margin-bottom:6px;">📋 Not Yet Attempted</h4>
        <div style="font-size:0.8rem;color:var(--dim)">${analysis.not_attempted.map(n => escapeHtml(n.label)).join(', ')}</div>
      </div>`;
    }

    if (analysis.strengths && analysis.strengths.length > 0) {
      analysisHtml += `<div style="margin-top:8px">
        <h4 style="color:var(--accent-green);font-size:0.8rem;margin-bottom:6px;">✓ Strong Areas</h4>
        <div style="font-size:0.8rem;color:var(--accent-green)">${analysis.strengths.map(s => `${escapeHtml(s.label)} (${s.best_pct}%)`).join(', ')}</div>
      </div>`;
    }

    // Assignments
    const assignmentList = (st.assignments || []).length > 0
      ? st.assignments.map(a => {
          const t = (st.assignment_times || {})[a] || '';
          return `<span style="font-size:0.75rem;background:rgba(0,212,255,0.08);padding:2px 8px;border-radius:4px;color:var(--accent-blue)">${escapeHtml(CL[a] || a)}${t ? ` (${t.split(' ')[0]})` : ''}</span>`;
        }).join(' ')
      : '<span style="font-size:0.8rem;color:var(--dim)">None submitted</span>';

    return `
      <div class="student-card">
        <div class="student-header">
          <div>
            <div class="student-name">${escapeHtml(st.name)}</div>
            <div class="student-meta">Registered: ${escapeHtml(st.registered)}</div>
          </div>
          <div class="student-percent">${st.completed}/${st.total} chapters (${st.percent}%)</div>
        </div>
        <div class="student-progress-bar">
          <div class="student-progress-fill" style="width: ${st.percent}%"></div>
        </div>

        <h4 style="color:var(--accent-blue);font-size:0.82rem;margin:14px 0 6px;">Chapter Progress</h4>
        <table class="quiz-table"><tr><th>Chapter</th><th>Status</th><th>Completed</th></tr>${chapterRows}</table>

        <h4 style="color:var(--accent-purple);font-size:0.82rem;margin:16px 0 6px;">Quiz Scores & Attempts</h4>
        <table class="quiz-table"><tr><th>Chapter</th><th>Best Score</th><th>Attempts</th><th>History</th></tr>${quizRows}</table>

        ${analysisHtml}

        <h4 style="color:var(--accent-blue);font-size:0.82rem;margin:16px 0 6px;">Assignment Submissions</h4>
        <div>${assignmentList}</div>
      </div>`;
  }).join('');

  document.getElementById('last-updated').textContent = `Last refreshed: ${new Date().toLocaleTimeString()}`;
}

// Fix #18: Only auto-refresh when tab is visible
loadDashboard();
setInterval(() => {
  if (!document.hidden) loadDashboard();
}, 30000);
</script>
</body>
</html>
