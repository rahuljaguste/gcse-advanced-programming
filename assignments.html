<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments — GCSE Advanced Programming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
  <style>
    :root{--bg:#0f0f1a;--card:#1a1a2e;--border:#27273a;--blue:#00d4ff;--green:#00ff88;--purple:#a855f7;--orange:#ff9f43;--red:#ff4757;--pink:#ff6b9d;--text:#e4e4e7;--dim:#71717a;--code-bg:#0d1117;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .top-bar{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .top-bar a{color:var(--dim);text-decoration:none;font-size:0.85rem;}
    .top-bar a:hover{color:var(--blue);}
    .top-bar h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    .tabs{display:flex;gap:0;border-bottom:2px solid var(--border);padding:0 32px;background:rgba(0,0,0,0.2);overflow-x:auto;}
    .tab{padding:12px 20px;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;font-family:'Inter',sans-serif;background:none;border-top:none;border-left:none;border-right:none;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--pink);border-bottom-color:var(--pink);}
    .tab .tab-check{margin-left:6px;color:var(--green);display:none;}
    .tab .tab-check.show{display:inline;}

    .content{padding:32px;max-width:1000px;margin:0 auto;}

    /* Assignment card */
    .assignment-view{display:none;}
    .assignment-view.active{display:block;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .a-header h2{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
    .a-header .a-chapter{font-size:0.8rem;color:var(--dim);margin-bottom:16px;}
    .a-header .a-skills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .skill-tag{padding:3px 10px;border-radius:12px;font-size:0.7rem;background:rgba(168,85,247,0.1);color:var(--purple);border:1px solid rgba(168,85,247,0.2);}

    .a-brief{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--pink);border-radius:12px;padding:20px;margin-bottom:20px;}
    .a-brief h3{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--pink);margin-bottom:10px;font-weight:700;}
    .a-brief ul{margin:8px 0 0 20px;color:var(--text);font-size:0.9rem;line-height:1.7;}
    .a-brief li{color:var(--text);}

    /* Editor */
    .a-editor{border-radius:12px;overflow:hidden;border:1px solid #30363d;box-shadow:0 4px 20px rgba(0,0,0,0.3);margin-bottom:16px;}
    .a-editor-bar{background:#1c2129;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #30363d;}
    .a-dots{display:flex;gap:6px;}
    .a-dots span{width:12px;height:12px;border-radius:50%;}
    .a-dots span:nth-child(1){background:#ff5f57;}
    .a-dots span:nth-child(2){background:#febc2e;}
    .a-dots span:nth-child(3){background:#28c840;}
    .a-editor-bar .a-filename{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--dim);flex:1;margin-left:28px;}
    .a-actions{display:flex;gap:8px;}
    .a-btn{padding:5px 14px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:'Inter',sans-serif;transition:all .2s;border:1px solid #30363d;}
    .a-btn-reset{background:none;color:var(--dim);}
    .a-btn-reset:hover{border-color:var(--orange);color:var(--orange);}
    .a-btn-run{background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.3);color:var(--green);font-weight:700;}
    .a-btn-run:hover{background:rgba(0,255,136,0.2);box-shadow:0 0 10px rgba(0,255,136,0.15);}
    .a-btn-save{background:rgba(0,212,255,0.12);border-color:rgba(0,212,255,0.3);color:var(--blue);font-weight:700;}
    .a-btn-save:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 10px rgba(0,212,255,0.15);}
    .a-btn-submit{background:linear-gradient(135deg,var(--green),var(--blue));border:none;color:var(--bg);font-weight:700;padding:6px 20px;}
    .a-btn-submit:hover{box-shadow:0 0 16px rgba(0,255,136,0.3);}
    .a-btn:disabled{opacity:0.5;cursor:not-allowed;}

    .a-editor-wrap{min-height:350px;}
    .a-editor-wrap .CodeMirror{height:350px!important;background:var(--code-bg)!important;font-family:'JetBrains Mono',monospace!important;font-size:0.85rem!important;line-height:1.7!important;}
    .a-editor-wrap .CodeMirror-gutters{background:rgba(0,0,0,0.2)!important;border-right:1px solid #30363d!important;}
    .a-editor-wrap .CodeMirror-linenumber{color:#484f58!important;font-size:0.76rem!important;}
    .a-code{display:none;}
    .a-code::placeholder{color:#484f58;}

    /* Stdin */
    /* Interactive terminal input */
    .a-term-input-line{display:flex;align-items:center;}
    .a-term-input-line .t-prompt-text{color:var(--text);white-space:pre;font-family:'JetBrains Mono',monospace;font-size:0.85rem;}
    .a-term-input{background:none;border:none;color:var(--orange);font-family:'JetBrains Mono',monospace;font-size:0.85rem;outline:none;flex:1;caret-color:var(--orange);}
    .t-user-input{color:var(--orange);}
    .a-output.waiting{border-color:var(--orange);}

    /* Output */
    .a-output-wrap{border-radius:12px;overflow:hidden;border:1px solid #30363d;margin-bottom:20px;}
    .a-output-bar{background:#1c2129;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;color:var(--dim);border-bottom:1px solid #30363d;}
    .a-output{background:#0a0e14;padding:16px 20px;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--green);min-height:60px;max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.6;margin:0;cursor:default;}
    .a-error{color:var(--red);}
    .a-info{color:var(--dim);font-style:italic;}
    .t-output{color:var(--green);}

    /* Save status */
    .a-save-status{font-size:0.8rem;margin-left:12px;transition:all .3s;}
    .a-save-status.saved{color:var(--green);}
    .a-save-status.saving{color:var(--blue);}
    .a-save-status.error{color:var(--red);}

    .a-footer{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .a-submitted-info{font-size:0.78rem;color:var(--dim);margin-top:8px;}

    @media(max-width:768px){
      .top-bar{padding:12px 16px;flex-wrap:wrap;gap:8px;}
      .tabs{padding:0 12px;}
      .tab{padding:10px 12px;font-size:0.72rem;}
      .content{padding:12px;}
      .a-header h2{font-size:1.2rem;}
      .a-skills{gap:4px;}
      .skill-tag{font-size:0.65rem;padding:2px 8px;}
      .a-brief{padding:14px;}
      .a-actions{flex-wrap:wrap;gap:6px;}
      .a-code{min-height:250px;font-size:0.8rem;padding:14px;}
      .a-footer{flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="/">&larr; Back to lessons</a>
  <h1>📝 Assignments</h1>
  <a href="/playground">Open Playground &rarr;</a>
</div>

<div class="tabs" id="tabs"></div>

<div class="content" id="content"></div>

<script>
const ASSIGNMENTS = [
  {id:"ch1",  chapter:"Chapter 1", title:"Pocket Money Calculator",  skills:["Procedures","Functions","Parameters","Return values"],
   brief:["Write a <b>procedure</b> <code>show_menu()</code> that prints chores and pay rates",
          "Write a <b>function</b> <code>calculate_pay(chores_done)</code> that returns total pay",
          "Write a <b>function</b> <code>add_bonus(total)</code> — adds 20% if total > £5",
          "Main program: ask which chores were done, calculate and display total"]},
  {id:"ch2",  chapter:"Chapter 2", title:"Spotify Playlist Manager",  skills:["1D Arrays","Loops","len()","append/remove"],
   brief:["Start with 5 songs hardcoded in a list",
          "Menu: View all (with position numbers), Add, Remove, Swap, Count",
          "Loop so the user can keep managing until they type 'quit'"]},
  {id:"ch3",  chapter:"Chapter 3", title:"Tic-Tac-Toe",  skills:["2D Arrays","Nested loops","Functions"],
   brief:["3x3 board using a 2D array","Display the board after each move",
          "Players take turns entering row and column (X and O)",
          "Check if cell is empty before placing",
          "<b>STRETCH:</b> Check for a winner (3 in a row/column/diagonal)"]},
  {id:"ch4",  chapter:"Chapter 4", title:"Pokemon Card Collection",  skills:["Records","Dictionaries","Arrays of records","Searching"],
   brief:["Create records for cards: name, type, HP, attack_power, rarity",
          "Start with 5 cards in an array","Menu: View all, Search by name, Find highest HP, Battle",
          "<b>STRETCH:</b> Add new cards to the collection"]},
  {id:"ch5",  chapter:"Chapter 5", title:"Digital Diary",  skills:["File read","File write","File append","readlines()"],
   brief:["Menu: Write Entry, Read All, Search by Date, Quit",
          "Auto-add today's date when writing","Use append mode so old entries aren't erased",
          "<b>STRETCH:</b> Add a password to protect the diary"]},
  {id:"ch6",  chapter:"Chapter 6", title:"Race to 50 Dice Game",  skills:["random","while loops","Decision logic"],
   brief:["2 players take turns rolling a dice","Each turn: roll as many times as you want, points add up",
          "Roll a 1 = lose ALL points from that turn","Choose to 'hold' to keep points safely",
          "First to 50 total wins"]},
  {id:"ch7",  chapter:"Chapter 7", title:"Haunted Hotel Adventure",  skills:["Global/local scope","Functions","Structured programming"],
   brief:["Global variables: player_health, player_inventory",
          "Each room is a function: entrance(), dark_cave(), treasure_room(), dragon_lair()",
          "Choices lead to other rooms (calling other functions)",
          "Items collected in one room must be available in others"]},
  {id:"ch8",  chapter:"Chapter 8", title:"Secure Login System",  skills:["Validation","Authentication","while loops","Testing"],
   brief:["Store 3 usernames and passwords","Validate: username not empty, password 8+ characters",
          "Give 3 attempts then lock out","Welcome message on success",
          "Write a TEST PLAN with 6 tests (normal, boundary, erroneous)"]},
  {id:"ch10", chapter:"Chapter 10", title:"Slot Machine (Final Project)",  skills:["Arrays","Random","Files","Functions","Validation","Loops"],
   brief:["Start with 100 coins, each spin costs 5","5 symbols: Bell, Cherry, Banana, Dollar, Skull",
          "Scoring rules (see starter code for details)","Any Skull cancels ALL winnings",
          "Save high scores to a file"]},
  {id:"proj1", chapter:"Final Project", title:"Gaming Opponents (Easy)", skills:["Files","Random","Arrays","Validation"],
   brief:["Ask for player name (validate: at least 1 character)",
          "20 gamer names pre-loaded in starter code",
          "Randomly pick one opponent and announce the match",
          "<b>Extension:</b> Generate random scores and declare a winner"]},
  {id:"proj2", chapter:"Final Project", title:"Scored Opponents (Medium)", skills:["Files","Random","Arrays","String splitting"],
   brief:["Each gamer has a name AND score: <code>\"ShadowNinja 85\"</code>",
          "Use <code>.split(\" \")</code> to separate name and score",
          "Randomly pick opponent, generate your score, compare and declare winner"]},
  {id:"proj3", chapter:"Final Project", title:"Gaming Teams (Medium-Hard)", skills:["Random","Arrays","String splitting","Validation"],
   brief:["Ask how many players per team (1-10, validated)",
          "Randomly split into two teams — no repeated players",
          "Calculate total score per team, declare the winner",
          "<b>Extension:</b> Add yourself to a team with a random score"]},
  {id:"proj5", chapter:"Final Project", title:"Freestyle Project", skills:["Random","Arrays","Files","Functions"],
   brief:["Design your OWN project — anything you like!",
          "Must include at least 3 skills: random, arrays, files, or functions",
          "Ideas: quiz game, virtual pet, budget tracker, recipe book, text RPG"]},
  {id:"ch13", chapter:"Unit 2", title:"Searching Algorithms", skills:["Linear search","Binary search","Comparisons"],
   brief:["Implement <code>linear_search(data, target)</code> — returns index or -1",
          "Implement <code>binary_search(data, target)</code> — returns index or -1",
          "Count comparisons for each and print the difference",
          "Test with a sorted list of 20 numbers"]},
  {id:"ch14", chapter:"Unit 2", title:"Sorting — Bubble Sort", skills:["Bubble sort","Swap counting","Optimisation"],
   brief:["Implement <code>bubble_sort(data)</code> that sorts in-place",
          "Print the list after each pass to visualise sorting",
          "Count and display total swaps",
          "Add early exit: stop if no swaps in a pass",
          "<b>STRETCH:</b> Implement merge sort and compare"]},
];

// Starter code — set after data script loads
let STARTER_CODE = {};

let studentName = localStorage.getItem('student-name') || '';
let savedCode = {};    // { ch1: "code...", ch2: "code..." }
let savedTimes = {};

// === INIT ===
async function init() {
  if (!studentName) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;padding:60px;color:var(--dim);">Please <a href="/" style="color:var(--blue);">log in</a> first.</p>';
    return;
  }

  // Load saved submissions
  try {
    const res = await fetch(`/api/assignments/${studentName}`);
    const data = await res.json();
    savedCode = data.submissions || {};
    savedTimes = data.times || {};
  } catch(e) { console.warn('Failed to load assignments:', e); }

  renderTabs();
  renderAssignments();
  // CodeMirror init happens after scripts load (below)

  // Open assignment from URL hash (e.g. /assignments#ch7)
  const hash = window.location.hash.replace('#', '');
  const validId = ASSIGNMENTS.find(a => a.id === hash);
  showAssignment(validId ? hash : ASSIGNMENTS[0].id);
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = ASSIGNMENTS.map(a => {
    const hasSubmission = !!savedCode[a.id];
    return `<button class="tab" data-id="${a.id}" onclick="showAssignment('${a.id}')">
      ${a.title.split(' ')[0]}${a.title.split(' ').length > 1 ? ' ' + a.title.split(' ').slice(1,3).join(' ') : ''}
      <span class="tab-check ${hasSubmission ? 'show' : ''}">✓</span>
    </button>`;
  }).join('');
}

function showAssignment(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.querySelectorAll('.assignment-view').forEach(v => v.classList.toggle('active', v.id === 'a-' + id));
}

function renderAssignments() {
  const content = document.getElementById('content');
  content.innerHTML = ASSIGNMENTS.map(a => {
    const code = savedCode[a.id] || STARTER_CODE[a.id] || '# Start coding here\n';
    const time = savedTimes[a.id] || '';
    const skills = a.skills.map(s => `<span class="skill-tag">${s}</span>`).join('');
    const items = a.brief.map(b => `<li>${b}</li>`).join('');
    const hasInput = code.includes('input(');

    return `<div class="assignment-view" id="a-${a.id}">
      <div class="a-header">
        <h2>${a.title}</h2>
        <div class="a-chapter">${a.chapter}</div>
        <div class="a-skills">${skills}</div>
      </div>

      <div class="a-brief">
        <h3>🎯 Requirements</h3>
        <ul>${items}</ul>
      </div>

      <div class="a-editor">
        <div class="a-editor-bar">
          <div class="a-dots"><span></span><span></span><span></span></div>
          <span class="a-filename">${a.id}_assignment.py</span>
          <div class="a-actions">
            <button class="a-btn a-btn-reset" onclick="resetCode('${a.id}')">Reset</button>
            <button class="a-btn a-btn-run" onclick="runAssignment('${a.id}')">▶ Run</button>
            <button class="a-btn a-btn-save" onclick="saveAssignment('${a.id}')">💾 Save</button>
            <button class="a-btn a-btn-submit" onclick="submitAssignment('${a.id}')">Submit</button>
          </div>
        </div>
        <div class="a-editor-wrap" id="editor-wrap-${a.id}">
          <textarea class="a-code" id="code-${a.id}">${escapeForTextarea(code)}</textarea>
        </div>
      </div>

      <div class="a-output-wrap">
        <div class="a-output-bar">
          <span>Terminal</span>
          <button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.7rem;" onclick="clearOutput('${a.id}')">Clear</button>
        </div>
        <div class="a-output" id="output-${a.id}" onclick="focusTermInput('${a.id}')">
          <span class="a-info">Click ▶ Run to test your code. input() prompts will appear here.</span>
        </div>
      </div>

      <div class="a-footer">
        <span class="a-save-status" id="status-${a.id}"></span>
        ${time ? `<div class="a-submitted-info">Last saved: ${time}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // Tab key support for all editors
  document.querySelectorAll('.a-code').forEach(ta => {
    ta.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = this.selectionStart, end = this.selectionEnd;
        this.value = this.value.substring(0, s) + '    ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = s + 4;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        const id = this.id.replace('code-', '');
        runAssignment(id);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        const id = this.id.replace('code-', '');
        saveAssignment(id);
      }
    });
  });
}

function escapeForTextarea(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// CodeMirror editors stored per assignment
const cmEditors = {};

function initCodeMirrorEditors() {
  document.querySelectorAll('.a-code').forEach(ta => {
    const id = ta.id.replace('code-', '');
    if (cmEditors[id]) return;
    cmEditors[id] = CodeMirror.fromTextArea(ta, {
      mode: 'python',
      theme: 'material-darker',
      lineNumbers: true,
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      matchBrackets: true,
      autoCloseBrackets: true,
      extraKeys: {
        'Tab': function(cm) { cm.replaceSelection('    ', 'end'); },
        'Ctrl-Enter': function() { runAssignment(id); },
        'Cmd-Enter': function() { runAssignment(id); },
        'Ctrl-S': function() { saveAssignment(id); },
        'Cmd-S': function() { saveAssignment(id); },
      }
    });
  });
}

function getCmCode(id) {
  if (cmEditors[id]) return cmEditors[id].getValue();
  const ta = document.getElementById('code-' + id);
  return ta ? ta.value : '';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function resetCode(id) {
  if (!confirm('Reset to starter code? Your changes will be lost.')) return;
  if (cmEditors[id]) cmEditors[id].setValue(STARTER_CODE[id] || '');
  else document.getElementById('code-' + id).value = STARTER_CODE[id] || '';
  clearOutput(id);
}

// Track per-assignment stdin state
const assignmentStdin = {};
const assignmentRunning = {};

function clearOutput(id) {
  const output = document.getElementById('output-' + id);
  output.innerHTML = '<span class="a-info">Click ▶ Run to test your code. input() prompts will appear here.</span>';
  assignmentStdin[id] = '';
  assignmentRunning[id] = false;
}

function focusTermInput(id) {
  const input = document.getElementById('term-input-' + id);
  if (input) input.focus();
}

async function runAssignment(id) {
  assignmentStdin[id] = '';
  assignmentRunning[id] = true;
  const output = document.getElementById('output-' + id);
  output.innerHTML = '';
  await executeAssignment(id);
}

async function executeAssignment(id) {
  if (!assignmentRunning[id]) return;
  const code = getCmCode(id);
  const output = document.getElementById('output-' + id);

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, stdin: assignmentStdin[id] || '' })
    });
    const data = await res.json();
    if (!assignmentRunning[id]) return;

    output.innerHTML = '';

    if (data.needs_input) {
      const lines = (data.stdout || '').split('\n');
      const promptText = lines.pop();
      const completeOutput = lines.join('\n');
      if (completeOutput) {
        output.innerHTML += `<span class="t-output">${escapeHtml(completeOutput)}\n</span>`;
      }
      // Show inline input
      const line = document.createElement('div');
      line.className = 'a-term-input-line';
      line.innerHTML = `<span class="t-prompt-text">${escapeHtml(promptText)}</span><input id="term-input-${id}" class="a-term-input" type="text" autofocus>`;
      output.appendChild(line);
      const input = document.getElementById('term-input-' + id);
      input.focus();
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          const value = input.value;
          line.innerHTML = `<span class="t-prompt-text">${escapeHtml(promptText)}</span><span class="t-user-input">${escapeHtml(value)}</span>`;
          assignmentStdin[id] = (assignmentStdin[id] || '') + value + '\n';
          executeAssignment(id);
        }
      });
      output.scrollTop = output.scrollHeight;
      return;
    }

    if (data.stdout) {
      output.innerHTML += `<span class="t-output">${escapeHtml(data.stdout)}</span>`;
    }
    if (data.stderr && data.returncode !== 0) {
      output.innerHTML += `<span class="a-error">${escapeHtml(data.stderr)}</span>`;
    }
    assignmentRunning[id] = false;
  } catch (e) {
    output.innerHTML = '<span class="a-error">Could not connect to server.</span>';
    assignmentRunning[id] = false;
  }
}

async function saveAssignment(id) {
  const code = getCmCode(id);
  const status = document.getElementById('status-' + id);
  status.textContent = 'Saving...';
  status.className = 'a-save-status saving';

  try {
    const res = await fetch(`/api/assignments/${studentName}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ assignment: id, code })
    });
    const data = await res.json();
    if (data.status === 'ok') {
      savedCode[id] = code;
      status.textContent = '✓ Saved';
      status.className = 'a-save-status saved';
      // Update tab checkmark
      const tab = document.querySelector(`.tab[data-id="${id}"] .tab-check`);
      if (tab) tab.classList.add('show');
    } else {
      status.textContent = data.error || 'Save failed';
      status.className = 'a-save-status error';
    }
  } catch(e) {
    status.textContent = 'Connection error';
    status.className = 'a-save-status error';
  }
  setTimeout(() => { status.textContent = ''; }, 3000);
}

async function submitAssignment(id) {
  // Submit = save + confirmation
  await saveAssignment(id);
  const status = document.getElementById('status-' + id);
  status.textContent = '🎉 Submitted!';
  status.className = 'a-save-status saved';
  setTimeout(() => { status.textContent = ''; }, 4000);
}

   global player_health\n\n    print(\"\\n--- THE TREASURE ROOM ---\")\n    print(\"Gold coins glitter everywhere! A jewelled sword sits on a pedestal.\")\n\n    # TODO: Add \"sword\" to player_inventory\n    # Print \"You picked up a SWORD!\"\n\n    # There's a trap!\n    print(\"\\nBut wait \u2014 the floor starts to crack beneath you!\")\n    print(\"  1. Jump to safety (test your luck)\")\n    print(\"  2. Grab more gold and run\")\n\n    choice = input(\"Quick! (1 or 2): \").strip()\n\n    if choice == \"1\":\n        if random.randint(1, 6) >= 3:  # 67% chance\n            print(\"You leap to safety! Close one.\")\n        else:\n            print(\"You stumble! Take 30 damage!\")\n            # TODO: Reduce player_health by 30\n            pass\n    else:\n        print(\"Greedy! The floor collapses! Take 50 damage!\")\n        # TODO: Reduce player_health by 50\n        pass\n\n    show_status()\n\n    if player_health <= 0:\n        print(f\"\\n{player_name} has fallen. Game over.\")\n        return\n\n    print(\"\\nOnly one door remains: the DRAGON'S LAIR.\")\n    input(\"Press Enter to continue...\")\n    dragon_lair()\n\n\ndef dragon_lair():\n    \"\"\"The final room. Do you have what it takes?\"\"\"\n    global player_health\n\n    print(\"\\n--- THE DRAGON'S LAIR ---\")\n    print(\"A massive dragon blocks the exit. Its eyes glow red.\")\n\n    # TODO: Check if \"sword\" is in player_inventory\n    #   If yes: print \"You draw your sword!\" and the dragon takes damage\n    #   If no: print \"You have no weapon! This is going to hurt...\"\n    #           Reduce player_health by 40\n\n    has_sword = \"sword\" in player_inventory\n\n    if has_sword:\n        print(\"You draw the jewelled SWORD and slash at the dragon!\")\n        print(\"The dragon roars and flies away! YOU WIN!\")\n    else:\n        print(\"With no weapon, the dragon swats you aside!\")\n        player_health -= 40\n\n    show_status()\n\n    if player_health > 0:\n        print(f\" \n    return True\n\n\ndef get_valid_username():\n    \"\"\"\n    Keeps asking for a username until a valid one is entered.\n    Valid = not empty.\n    \"\"\"\n    while True:\n        username = input(\"Username: \").strip().lower()\n        # TODO: Use presence_check() to validate\n        #   If valid: return the username\n        #   If invalid: the loop continues (asks again)\n        return username\n\n\ndef get_valid_password():\n    \"\"\"\n    Keeps asking for a password until a valid one is entered.\n    Valid = not empty AND at least 8 characters.\n    \"\"\"\n    while True:\n        password = input(\"Password: \").strip()\n        # TODO: Use presence_check() AND length_check() to validate\n        #   Both must pass for the password to be valid\n        #   If valid: return the password\n        return password\n\n\ndef authenticate(username, password):\n    \"\"\"\n    Checks if the username exists AND the password matches.\n    Returns True if authenticated, False otherwise.\n    \"\"\"\n    # TODO: Check if username is in the users dictionary\n    #   AND if users[username] equals the password\n    #   Return True or False\n    # Hint: if username in users and users[username] == password:\n    return False\n\n\ndef login():\n    \"\"\"Main login flow with limited attempts.\"\"\"\n    print(\"\\n\" + \"=\" * 40)\n    print(\"  SECRET CLUB LOGIN\")\n    print(\"  Authorised members only!\")\n    print(\"=\" * 40)\n\n    attempts = 0\n\n    while attempts < MAX_ATTEMPTS:\n        remaining = MAX_ATTEMPTS - attempts\n        print(f\"\\n  Attempts remaining: {remaining}\")\n        print(\"-\" * 30)\n\n        username = get_valid_username()\n        password = get_valid_password()\n\n        if authenticate(username, password):\n            print(f\"\\n  ACCESS GRANTED!\")\n            print(f\"  Welcome to the club, {username}!\")\n            return True\n        else:\n            attempts += 1\n            print(\"  ACCESS DENIED. Wrong username or password.\")\n\n    # If we get here, they've used all attempts\n    print(\"\\n  LOCKED OUT! Too many failed attempts.\")\n    print(\"  Come back later.\")\n    return False\n\n\n# ============================================================================\n#  TEST PLAN \u2014 Fill this in after building your solution!\n# ============================================================================\n# Test | Description          | Test Data                | Expected        | Type\n# -----|----------------------|--------------------------|-----------------|----------\n#  1   |                      |                          |                 | Normal\n#  2   |                      |                          |                 | Normal\n#  3   |                      |                          |                 | Boundary\n#  4   |                      |                          |                 | Boundary\n#  5   |                      |                          |                 | Erroneous\n#  6   |                      |                          |                 | Erroneous\n\n\n# ============================================================================\n#  MAIN\n# ============================================================================\nif __name__ == \"__main__\":\n    success = login()\n    if success:\n        print(\"\\n  You now have access to the secret club menu!\")\n        print(\"  (Build something cool here as a stretch goal!)\")\n", "ch10": "# ============================================================================\n#  CHAPTER 10: SLOT MACHINE \u2014 FINAL PROJECT\n# ============================================================================\n#  The big one! A full slot machine game combining:\n#  arrays, random, file handling, functions, validation, loops.\n#\n#  RULES:\n#  - Start with 100 coins, each spin costs 5\n#  - 3 spinners, each picks from: Bell, Cherry, Banana, Dollar, Skull\n#  - 3 matching fruits = 50 | 2 matching = 10\n#  - 3 Bells = 1000 | 2 Bells = 100\n#  - 3 Dollars = 500 | 2 Dollars = 50 | 1 Dollar = 1\n#  - ANY Skull = cancel ALL winnings for that spin\n#  - Save high scores to a file\n#\n#  SKILLS: Everything from the whole course!\n#  FILL IN: Everywhere you see TODO\n# ============================================================================\n\nimport random\n\nSYMBOLS = [\"Bell\", \"Cherry\", \"Banana\", \"Dollar\", \"Skull\"]\nSPIN_COST = 5\nSTARTING_COINS = 100\nHIGH_SCORE_FILE = \"highscores.txt\"\n\n\ndef spin_reels():\n    \"\"\"Spins 3 reels and returns the results as a list.\"\"\"\n    # TODO: Generate 3 random choices from SYMBOLS\n    # Return them as a list e.g. [\"Bell\", \"Cherry\", \"Dollar\"]\n    # Hint: use random.choice(SYMBOLS) three times, or use a loop\n    return [\"?\", \"?\", \"?\"]\n\n\ndef display_spin(results):\n    \"\"\"Displays the spin results nicely.\"\"\"\n    print(\"\\n  +---------+---------+---------+\")\n    print(f\"  | {results[0]:^7} | {results[1]:^7} | {results[2]:^7} |\")\n    print(\"  +---------+---------+---------+\")\n\n\ndef calculate_winnings(results):\n    \"\"\"\n    Calculates winnings based on the spin results.\n    Returns the number of coins won (0 if skull appears).\n    \"\"\"\n    winnings = 0\n\n    # TODO: First check \u2014 does ANY result contain \"Skull\"?\n    #   If yes: print \"SKULL! No winnings this round.\" and return 0\n\n    # TODO: Count how many of each symbol appeared\n    # Hint: results.count(\"Bell\"), results.count(\"Dollar\"), etc.\n\n    # TODO: Apply the scoring rules:\n    #   3 Bells = 1000\n    #   2 Bells = 100\n    #   3 Dollars = 500\n    #   2 Dollars = 50\n    #   1 Dollar = 1\n    #   3 of any fruit (Cherry/Banana) = 50\n    #   2 of any fruit = 10\n\n    # TODO: Return total winnings\n    return winnings\n\n\ndef show_high_scores():\n    \"\"\"Reads and displays high scores from file.\"\"\"\n    print(\"\\n--- HIGH SCORES ---\")\n    # TODO: Try to open and read HIGH_SCORE_FILE\n    #   Print each line\n    #   If file doesn't exist, print \"No high scores yet!\"\n    # Hint: use try/except FileNotFoundError\n    pass\n\n\ndef save_high_score(name, score):\n    \"\"\"Saves a player's score to the high scores file.\"\"\"\n    # TODO: Open HIGH_SCORE_FILE in append mode\n    #   Write the name and score (e.g. \"Alex 250\\n\")\n    #   Close the file\n    #   Print \"Score saved!\"\n    pass\n\n\n# ============================================================================\n#  MAIN GAME LOOP\n# ============================================================================\ndef main():\n    print(\"=\" * 45)\n    print(\"  SLOT MACHINE\")\n    print(\"  Can you beat the machine?\")\n    print(\"=\" * 45)\n\n    show_high_scores()\n\n    coins = STARTING_COINS\n    print(f\"\\nYou start with {coins} coins. Each spin costs {SPIN_COST}.\")\n\n    while coins >= SPIN_COST:\n        print(f\"\\n  Coins: {coins}\")\n        action = input(\"  [S]pin or [C]ash out? \").strip().lower()\n\n        if action == \"c\":\n            print(f\"  Smart move! You walk away with {coins} coins.\")\n            break\n\n        elif action == \"s\":\n            coins -= SPIN_COST\n            results = spin_reels()\n            display_spin(results)\n            winnings = calculate_winnings(results)\n\n            if winnings > 0:\n                print(f\"  YOU WON {winnings} COINS!\")\n            else:\n                print(f\"  No luck this time.\")\n\n            coins += winnings\n\n        else:\n            print(\"  Type 'S' to spin or 'C' to cash out!\")\n\n    if coins < SPIN_COST:\n        print(f\"\\n  You're out of coins! Final total: {coins}\")\n\n    # Save score\n    name = input(\"\\nEnter your name for the leaderboard: \").strip()\n    if name:\n        save_high_score(name, coins)\n\n    print(\"\\nThanks for playing!\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "proj1": "# ============================================================== etween 1 and 100\n    player_score = 0  # <-- FIX THIS\n\n    print(f\"\\n  {player} (Score: {player_score})\")\n    print(f\"    vs\")\n    print(f\"  {opp_name} (Score: {opp_score})\")\n\n    # TODO: Compare scores and print the winner\n    # If player_score > opp_score: player wins\n    # If opp_score > player_score: opponent wins\n    # If equal: draw\n\n\nif __name__ == \"__main__\":\n    main()\n", "proj3": "# ============================================================================\n#  PROJECT 3: GAMING TEAMS (Medium-Hard \u2014 Levels 7-9)\n# ============================================================================\n#  Split players into two random teams and see who wins!\n#  Skills: File reading, random, arrays, string splitting, sorting\n# ============================================================================\n\nimport random\n\n# Each line is \"Name Score\" \u2014 from gamerNamesScores.txt\nGAMER_DATA = [\n    \"ShadowNinja 85\", \"PixelQueen 92\", \"TurboFox 67\",\n    \"DragonSlayer99 78\", \"CosmicWolf 55\", \"NeonBlitz 99\",\n    \"IcePhoenix 73\", \"ThunderBolt 88\", \"CyberPunk42 61\",\n    \"StarDust 95\", \"MysticRaven 82\", \"GhostRider 70\",\n    \"LavaKing 90\", \"QuantumLeap 64\", \"NightHawk 87\",\n    \"BlazeMaster 76\", \"FrostByte 93\", \"TechWizard 58\",\n    \"StormChaser 81\", \"ZeroGravity 72\",\n]\n\n\ndef parse_player(entry):\n    \"\"\"Split 'Name Score' into (name, score) tuple.\"\"\"\n    parts = entry.split(\" \")\n    return (parts[0], int(parts[1]))\n\n\ndef get_team_size():\n    \"\"\"Ask how many players per team (1-10). Validate input.\"\"\"\n    while True:\n        size_str = input(\"How many players per team? (1-10): \").strip()\n        # TODO: Validate that input is a digit and between 1-10\n        # Hint: use .isdigit() and range check\n        if size_str.isdigit():\n            size = int(size_str)\n            if 1 <= size <= 10:\n                return size\n        print(\"Must be a number between 1 and 10!\")\n\n\ndef pick_teams(data, size):\n    \"\"\"\n    Randomly split players into two teams of the given size.\n    No player should appear on both teams!\n    Returns: (team1, team2) \u2014 each is a list of (name, score) tuples\n    \"\"\"\n    # TODO: Use random.sample() to pick (size * 2) unique players from data\n    # Hint: selected = random.sample(data, size * 2)\n\n    # TODO: Split selected into two halves \u2014 first half = team1, second = team2\n\n    # TODO: Parse each entry into (name, score) using parse_player()\n\n    team1 = []\n    team2 = []\n    return (team1, team2)\n\n\ndef display_team(name, team):\n    \"\"\"Print a team's players and scores.\"\"\"\n    print(f\"\\n  {name}:\")\n    total = 0\n    for player_name, score in team:\n        print(f\"    {player_name:<20} {score}\")\n        total += score\n    print(f\"    {'TOTAL':<20} {total}\")\n    return total\n\n\ndef main():\n    print(\"=\" * 40)\n    print(\"  GAMING TEAMS\")\n    print(\"  Random teams, random glory!\")\n    print(\"=\" * 40)\n\n    size = get_team_size()\n    team1, team2 = pick_teams(GAMER_DATA, size)\n\n    score1 = display_team(\"TEAM ALPHA\", team1)\n    score2 = display_team(\"TEAM BRAVO\", team2)\n\n    # TODO: Compare total scores and declare the winning team\n    print(f\"\\n  {'=' * 30}\")\n    if score1 > score2:\n        print(f\"  TEAM ALPHA WINS! ({score1} vs {score2})\")\n    elif score2 > score1:\n        print(f\"  TEAM BRAVO WINS! ({score2} vs {score1})\")\n    else:\n        print(f\"  IT'S A DRAW! ({score1} each)\")\n\n    # EXTENSION: Add yourself to a team with a random score\n    # EXTENSION: Allow user to add new names to the data\n\n\nif __name__ == \"__main__\":\n    main()\n", "proj5": "# ============================================================================\n#  PROJECT 5: FREESTYLE (Medium-Hard \u2014 Levels 7-9)\n# ============================================================================\n#  Design your OWN Python project! It ounting, early exit optimisation\n#  FILL IN: Everywhere you see TODO\n# ============================================================================\n\nimport random\n\n\ndef bubble_sort(data):\n    \"\"\"\n    Sort a list using bubble sort.\n    Prints the list after each pass.\n    Returns: total number of swaps.\n    \"\"\"\n    n = len(data)\n    total_swaps = 0\n\n    for pass_num in range(n - 1):\n        swapped = False\n\n        # TODO: Loop through the list (index i from 0 to n-1-pass_num)\n        #   Compare data[i] with data[i+1]\n        #   If data[i] > data[i+1], swap them and set swapped = True\n        #   Count each swap in total_swaps\n        # Hint for swap: data[i], data[i+1] = data[i+1], data[i]\n\n        print(f\"  Pass {pass_num + 1}: {data}\")\n\n        # TODO: If no swaps happened this pass, the list is sorted \u2014 break early!\n        # Hint: if not swapped: break\n\n    return total_swaps\n\n\ndef main():\n    print(\"=\" * 50)\n    print(\"  BUBBLE SORT VISUALISER\")\n    print(\"=\" * 50)\n\n    # Generate a random list\n    numbers = random.sample(range(1, 50), 8)\n    print(f\"\\nUnsorted: {numbers}\")\n    print(\"\\nSorting...\\n\")\n\n    swaps = bubble_sort(numbers)\n\n    print(f\"\\nSorted:   {numbers}\")\n    print(f\"Total swaps: {swaps}\")\n\n    # STRETCH: Try with different sized lists and compare swap counts\n    # STRETCH: Implement merge sort and compare the number of operations\n\n\nif __name__ == \"__main__\":\n    main()\n"};
